<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Body Nation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700&family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
  </head>
  <body>
    <div data-site-header></div>
    <main class="shell">
      <section class="section-intro">
        <p class="eyebrow">Checkout prep</p>
        <h1>Your Cart</h1>
        <p class="muted">Local cart logic is already in place and can later map to user accounts or server-side sessions.</p>
      </section>
      <div data-cart-status></div>
      <section class="cart-layout">
        <div class="cart-stack" data-cart-items></div>
        <aside data-cart-summary></aside>
      </section>
    </main>
    <div data-site-footer></div>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/cart.js"></script>
  </body>
</html>
